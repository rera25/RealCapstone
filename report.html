<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Alayadi Alsarea</title>

  <!-- Bootstrap & Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background-color: #f4f7fc;
      font-family: 'Segoe UI', sans-serif;
    }

    .container-fluid {
      position: relative;
      min-height: 100vh;
      margin: 0 !important;
      padding: 0 !important;
      z-index: 1;
    }

    .container-fluid::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background-image: url('background.png');
      background-size: 1200px;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      opacity: 0.2;
      z-index: -1;
    }

    .layout {
      display: flex;
      min-height: calc(100vh - 48px);
      margin: 0;
      padding: 0;
    }

    .sidebar {
      background-color: #1B2C7A;
      color: white;
      width: 250px;
      transition: 0.3s;
      overflow-x: hidden;
      flex-shrink: 0;
    }

    .sidebar.collapsed {
      width: 100px;
    }

    .sidebar .nav-link {
      background: white;
      color: #000;
      margin: 10px 20px;
      text-align: center;
      border-radius: 10px;
      transition: 0.3s;
    }

    .sidebar .nav-link:hover {
      background: #007bff;
      color: white;
    }

    .sidebar .nav-link.active {
      background: #a3f2ff;
      font-weight: bold;
    }

    .sidebar.collapsed .nav-link {
      padding: 5px;
      justify-content: center;
      font-size: 0;
    }

    .sidebar.collapsed .nav-link i {
      font-size: 1.25rem;
      margin-right: 0;
    }

    .sidebar.collapsed .text-center,
    .sidebar.collapsed h5,
    .sidebar.collapsed p {
      display: none;
    }

    .main-content {
      flex-grow: 1;
      padding: 50px;
      transition: 0.3s;
    }

    .topbar {
      color: white;
      background-color: #27397f;
      margin-bottom: 0;
    }

input.form-control {
  background: rgba(255, 255, 255, 0.7);
  border: 1px solid black; /* Blue border */
  border-radius: 4px; /* Optional rounded corners */
  width: 300px;
}

    .sidebar.collapsed + .main-content {
      margin-left: 100px; /* matches collapsed width */
    }
	
    @media (max-width: 768px) {
      .sidebar {
        position: absolute;
        z-index: 1050;
        height: 100%;
      }
	
      .sidebar.collapsed {
        transform: translateX(-100%);
      }
    }

    img.logo {
      width: 100%;
      max-width: 100%;
      display: block;
    }

    /* Fixed topbar logo */
    .topbar-logo {
      display: block;
      margin: 0 !important;
      padding: 0 !important;
      height: 100px;         /* fixed height */
      width: auto;          /* keep aspect ratio */
      flex-shrink: 0;       /* prevent shrinking */
    }


    .topbar {
      padding-top: 0 !important;
      padding-bottom: 0 !important;
	  padding-left: 0 !important;
    }
	
	.topbar .d-flex.align-items-center.gap-3 {
      margin-left: auto;      
      gap: 1rem !important;    
      padding-right: 0.75rem;  
    }
	

    .topbar .d-flex.align-items-center.gap-2.fw-bold {
      position: relative;
    }

    #toggleSidebar {
	  color: #27397f;
      position: absolute;
      left: 20px;   
      top: 50%;
      transform: translateY(-50%);
      z-index: 2;
      border: none;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      border-radius: 50%;
      box-shadow: 0 4px 8px rgba(0,0,0,0.25);
      transition: all 0.3s ease;
      cursor: pointer;
   }
   
   .main-content .d-flex.align-items-center.mb-3 {
      padding: 8px 12px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      display: inline-flex; /* keeps width to content */
    }


  </style>
</head>

<body>
  <div class="container-fluid">
    <div class="topbar d-flex justify-content-between align-items-center px-3 py-2 mb-0">
      <div class="d-flex align-items-center gap-2 fw-bold">
        <button id="toggleSidebar" class="btn btn-sm btn-light">
          <i class="bi bi-list"></i>
        </button>
        <img src="dash.png" alt="Responsive Image" class="topbar-logo">
      </div>
      <div class="flex-grow-1 mx-3">
        <input type="text" class="form-control" placeholder="Search...">
      </div>

      <div class="d-flex align-items-center gap-3 me-3">
        <a href="#" class="text-white fs-5"><i class="bi bi-bell-fill"></i></a>
        <a href="#" class="text-white fs-5"><i class="bi bi-chat-left-dots-fill"></i></a>
        <a href="#" class="text-white fs-5"><i class="bi bi-calendar-event-fill"></i></a>
      </div>

      <div class="dropdown">
        <a class="text-white fw-semibold dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
           Admin 12345
        </a>
          <ul class="dropdown-menu dropdown-menu-end">
             <li>
			   <a class="dropdown-item" href="#">Settings</a></li>
             <li>
               <a class="dropdown-item" href="#" onclick="logout()">Log Out</a>
             </li>
          </ul>
      </div>
    </div>

    <div class="layout">
      <nav id="sidebar" class="sidebar">
        <div class="text-center mb-4">
          <img src="514023848_755243170409980_216939426091704006_n.png" alt="Responsive Image" class="logo">
          <h5>Alayadi <span style="color:#fdd835;">Alsarea</span></h5>
          <p>Technical Services</p>
        </div>
        <a href="#" class="nav-link" href="#" onclick="home()"><i class="bi bi-house-door-fill"></i> Dashboard</a>
        <a href="#" class="nav-link href="#" onclick="book()"><i class="bi bi-calendar-check-fill"></i> Booking</a>
        <a href="#" class="nav-link"  href="#" onclick="emp()"><i class="bi bi-people-fill"></i> Employees</a>
        <a href="#" class="nav-link" href="#" onclick="bill()"><i class="bi bi-receipt"></i> Billing</a>
        <a href="#" class="nav-link" href="#" onclick="inv()"><i class="bi bi-box-seam"></i> Inventory</a>
        <a href="#" class="nav-link active"><i class="bi bi-bar-chart-fill"></i> Reports & Analytics</a>
      </nav>

      
      <main class="main-content">
	  <div class="d-flex align-items-center mb-3 px-3">
          <i class="bi bi-house-door-fill me-2 fs-10" style="color: gray;"></i>
          <span class="fw fs-10" style="color: gray;">Reports Management</span>
       </div>
	   
      <div class="flex-grow-1 mx-3">
        <input type="text" class="form-control" placeholder="Search...">
      </div>
		  



  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const sidebar = document.getElementById("sidebar");
  const toggleButton = document.getElementById("toggleSidebar");

  // Apply saved state on page load
  if (localStorage.getItem("sidebarCollapsed") === "true") {
    sidebar.classList.add("collapsed");
  }

  toggleButton.addEventListener("click", function () {
    sidebar.classList.toggle("collapsed");

    // Save state in localStorage
    localStorage.setItem("sidebarCollapsed", sidebar.classList.contains("collapsed"));
  });
</script>

  <script src="logout.js"></script>
  <script src="home.js"></script>
  <script src="book.js"></script>
  <script src="emp.js"></script>
  <script src="bill.js"></script>
  <script src="inv.js"></script>
</body>
</html>
